[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
via_ir = true  # required by GenerateTxTable.t.sol (stack too deep without it)
fs_permissions = [{ access = "read", path = "test/data" }, { access = "read-write", path = "Tx-Data-Table.md" }]

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
